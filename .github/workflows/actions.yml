name: Game-of-life

on:
  push:
    branches:
      - main

env:
  AWS_REGION: eu-central-1
  ECR_REPOSITORY: life-app
  ECS_CLUSTER: life-app-cluster
  ECS_SERVICE: life-app-service
  ECS_TASK_DEFINITION: task-definition.json
  CONTAINER_NAME: life-app

jobs:
  deployment:
    runs-on:
      - codebuild-game-of-life-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get AWS account ID
        id: aws-account
        shell: bash
        run: |
          echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: build-image
        shell: bash
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ACCOUNT_ID: ${{ steps.aws-account.outputs.account_id }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI=${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}
          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "image=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

